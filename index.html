// ── Main App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [loading, setLoading] = useState(true);
  const [loadingMsg, setLoadingMsg] = useState('Loading the grind...');
  const [showWelcome, setShowWelcome] = useState(false);
  const [view, setView] = useState('dashboard');
  const [profile, setProfile] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [recurringTasks, setRecurringTasks] = useState([]);
  const [inventory, setInventory] = useState(defaultInventory());
  const [settings, setSettings] = useState(defaultSettings());
  const [showTaskModal, setShowTaskModal] = useState(false);
  const [editingTask, setEditingTask] = useState(null);
  const [levelUpData, setLevelUpData] = useState(null);
  const [completionResult, setCompletionResult] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [achievementToasts, setAchievementToasts] = useState([]);
  const [calConnected, setCalConnected] = useState(false);
  const [syncStatus, setSyncStatus] = useState('offline'); // synced | syncing | error | offline
  const syncTimerRef = useRef(null);

  const showToast = useCallback((message, type = 'success', icon = '✅') => {
    const id = uuid();
    setToasts(prev => [...prev, { id, message, type, icon }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  // Debounced Drive sync — gathers ALL data from localStorage and uploads
  const performDriveSync = useCallback(async () => {
    if (!isGoogleConnected()) { setSyncStatus('offline'); return; }
    setSyncStatus('syncing');
    const payload = {
      version: 1,
      profile:   JSON.parse(localStorage.getItem('grind_user_profile') || 'null'),
      tasks:     JSON.parse(localStorage.getItem('grind_tasks') || 'null'),
      inventory: JSON.parse(localStorage.getItem('grind_inventory') || 'null'),
      settings:  JSON.parse(localStorage.getItem('grind_settings') || 'null'),
      recurring: JSON.parse(localStorage.getItem('grind_recurring') || 'null')
    };
    const ok = await saveDriveData(payload);
    setSyncStatus(ok ? 'synced' : 'error');
    if (ok) localStorage.setItem('grind_lastSync', new Date().toISOString());
  }, []);

  const scheduleDriveSync = useCallback(() => {
    if (!isGoogleConnected()) return;
    if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
    setSyncStatus('syncing');
    syncTimerRef.current = setTimeout(() => { performDriveSync(); }, 1500);
  }, [performDriveSync]);

  // Wire the storage hook so every save triggers a sync
  useEffect(() => {
    setDriveSyncHook(scheduleDriveSync);
    return () => setDriveSyncHook(null);
  }, [scheduleDriveSync]);

  // Boot — show app immediately from local, then sync from Drive in background
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        // 1. Load from local FIRST — never block UI on Google APIs
        const [p, t, inv, sett, rec] = await Promise.all([
          load('user_profile'), load('tasks'), load('inventory'), load('settings'), load('recurring')
        ]);
        if (cancelled) return;
        if (p) {
          setProfile(p);
          const loadedTasks = t?.tasks || [];
          const loadedRecurring = rec?.recurring || [];
          // Generate any missing instances since last open
          const gen = generateRecurringInstances(loadedRecurring, loadedTasks);
          setTasks(gen.updatedTasks);
          setRecurringTasks(gen.updatedRecurring);
          if (gen.createdCount > 0) {
            await save('tasks', { tasks: gen.updatedTasks });
            await save('recurring', { recurring: gen.updatedRecurring });
          }
          setInventory(inv || defaultInventory());
          setSettings(sett || defaultSettings());
        } else {
          setShowWelcome(true);
        }
      } catch(e) {
        console.error('Local load failed', e);
      } finally {
        if (!cancelled) setLoading(false);
      }

      // 2. AFTER the app is visible, try Google APIs (with hard timeout)
      const gReady = await Promise.race([
        initGoogleAPIs(),
        new Promise(r => setTimeout(() => r(false), 8000))
      ]);
      if (cancelled || !gReady) return;

      const connected = restoreToken();
      setCalConnected(connected);
      if (!connected) return;

      setSyncStatus('syncing');
      try {
        const drive = await Promise.race([
          loadDriveData(),
          new Promise(r => setTimeout(() => r(null), 10000))
        ]);
        if (cancelled) return;
        if (drive && drive.profile) {
          const localTime = localStorage.getItem('grind_lastSync');
          const driveTime = drive.syncedAt;
          const driveIsNewer = !localTime || (driveTime && new Date(driveTime) > new Date(localTime));
          if (driveIsNewer) {
            setDriveSyncHook(null);
            if (drive.profile)   await save('user_profile', drive.profile);
            if (drive.tasks)     await save('tasks', drive.tasks);
            if (drive.inventory) await save('inventory', drive.inventory);
            if (drive.settings)  await save('settings', drive.settings);
            if (drive.recurring) await save('recurring', drive.recurring);
            localStorage.setItem('grind_lastSync', drive.syncedAt);
            // Generate any missing instances after restore (different device, different last-open day)
            const loadedTasks = drive.tasks?.tasks || [];
            const loadedRecurring = drive.recurring?.recurring || [];
            const gen = generateRecurringInstances(loadedRecurring, loadedTasks);
            if (gen.createdCount > 0) {
              await save('tasks', { tasks: gen.updatedTasks });
              await save('recurring', { recurring: gen.updatedRecurring });
            }
            setProfile(drive.profile);
            setTasks(gen.updatedTasks);
            setRecurringTasks(gen.updatedRecurring);
            setInventory(drive.inventory || defaultInventory());
            setSettings(drive.settings || defaultSettings());
            setShowWelcome(false);
            setDriveSyncHook(scheduleDriveSync);
            showToast('Restored from cloud ☁️', 'success', '✨');
          }
          setSyncStatus('synced');
        } else if (drive === null) {
          setSyncStatus('error');
        } else {
          setSyncStatus('synced');
        }
      } catch(e) {
        console.warn('Drive bootstrap failed', e);
        if (!cancelled) setSyncStatus('error');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // Re-check calendar connection periodically + proactively refresh token before expiry
  useEffect(() => {
    const check = async () => {
      try {
        const t = JSON.parse(localStorage.getItem('grind_gtoken') || 'null');
        if (t?.token) {
          const msLeft = t.expires - Date.now();
          // Refresh silently if less than 5 minutes left
          if (msLeft > 0 && msLeft < 5 * 60 * 1000) {
            await silentRefresh();
          }
        }
      } catch(e) {}
      const c = isCalendarConnected();
      setCalConnected(c);
      if (!c) setSyncStatus('offline');
    };
    const id = setInterval(check, 60000);
    return () => clearInterval(id);
  }, []);

  // Background retry loop: silently sync any tasks with pendingCalendarSync flag
  useEffect(() => {
    let stopped = false;
    const retryPending = async () => {
      if (stopped) return;
      if (!settings.calendarSync) return;
      // Read fresh state from localStorage so this isn't tied to React state closures
      let currentTasks;
      try {
        currentTasks = JSON.parse(localStorage.getItem('grind_tasks') || '{"tasks":[]}').tasks || [];
      } catch(e) { return; }
      const pending = currentTasks.filter(t =>
        t.pendingCalendarSync && !t.calendarEventId && t.status === 'pending'
      );
      if (!pending.length) return;

      const ok = await ensureFreshToken();
      if (!ok) return;
      if (!stopped) setCalConnected(true);

      let synced = 0;
      let finalTasks = [...currentTasks];
      for (const t of pending) {
        const evId = await createCalEvent(t);
        if (evId) {
          synced++;
          finalTasks = finalTasks.map(x =>
            x.id === t.id ? { ...x, calendarEventId: evId, pendingCalendarSync: false } : x
          );
        }
      }
      if (synced > 0 && !stopped) {
        setTasks(finalTasks);
        await save('tasks', { tasks: finalTasks });
        showToast(`${synced} task${synced > 1 ? 's' : ''} synced to calendar 📅`, 'success', '☁️');
      }
    };
    // Try shortly after mount, then every 90s
    const initial = setTimeout(retryPending, 6000);
    const id = setInterval(retryPending, 90000);
    // Also try when the tab regains focus (user returning to app)
    const onFocus = () => retryPending();
    window.addEventListener('focus', onFocus);
    return () => {
      stopped = true;
      clearTimeout(initial);
      clearInterval(id);
      window.removeEventListener('focus', onFocus);
    };
  }, [settings.calendarSync, showToast]);

  // Daily reset
  useEffect(() => {
    if (!profile) return;
    const today = new Date().toDateString();
    if (profile.lastCoinResetDate !== today) {
      const newP = { ...profile, coinsEarnedToday: 0, lastCoinResetDate: today };
      setProfile(newP);
      save('user_profile', newP);
    }
  }, [profile?.lastCoinResetDate]);

  const applyXPAndCoins = useCallback((p, xp, coins) => {
    const newP = { ...p };
    newP.currentXP += xp;
    newP.totalXP += xp;
    newP.coins = Math.max(0, newP.coins + coins);
    newP.totalCoinsEarned += Math.max(0, coins);
    newP.coinsEarnedToday = (newP.coinsEarnedToday || 0) + Math.max(0, coins);

    const lvlResult = processLevelUp(newP.level, newP.currentXP, newP.xpToNextLevel);
    if (lvlResult.levelsGained > 0) {
      newP.level = lvlResult.level;
      newP.currentXP = lvlResult.xp;
      newP.xpToNextLevel = lvlResult.xpToNextLevel;
      newP.phase = getPhase(newP.level);
      Object.keys(newP.stats).forEach(s => { newP.stats[s] += lvlResult.levelsGained * 5; });
      const beatsToUnlock = Object.keys(STORY).map(Number).filter(n => !(newP.unlockedBeats||[]).includes(n) && n <= newP.level);
      newP.unlockedBeats = [...new Set([...(newP.unlockedBeats || [1]), ...beatsToUnlock])];
      setLevelUpData({ levelsGained: lvlResult.levelsGained, newLevel: newP.level });
    }
    return newP;
  }, []);

  const checkAchievements = useCallback((p) => {
    const earned = new Set(p.achievements || []);
    const newAchs = [];
    const state = { totalTasks: p.totalTasks||0, level: p.level, streakDays: p.streakDays, totalCoinsEarned: p.totalCoinsEarned, sRankTasks: p.sRankTasks||0, sssRankTasks: p.sssRankTasks||0 };
    ACHIEVEMENTS.forEach(ach => {
      if (!earned.has(ach.id) && ach.check(state)) {
        earned.add(ach.id);
        newAchs.push(ach);
        if (ach.reward?.coins) { p.coins += ach.reward.coins; p.totalCoinsEarned += ach.reward.coins; }
        if (ach.reward?.xp) { p.currentXP += ach.reward.xp; p.totalXP += ach.reward.xp; }
      }
    });
    if (newAchs.length > 0) {
      p.achievements = [...earned];
      newAchs.forEach((ach, i) => {
        setTimeout(() => {
          setAchievementToasts(prev => [...prev, { ...ach, _id: uuid() + i }]);
        }, i * 300);
      });
    }
    return p;
  }, []);

  const handleWelcomeStart = async (name) => {
    const p = { ...defaultProfile(), characterName: name };
    setProfile(p);
    setInventory(defaultInventory());
    setSettings(defaultSettings());
    setTasks([]);
    setRecurringTasks([]);
    await Promise.all([
      save('user_profile', p),
      save('tasks', { tasks: [] }),
      save('inventory', defaultInventory()),
      save('settings', defaultSettings()),
      save('recurring', { recurring: [] })
    ]);
    setShowWelcome(false);
  };

  const handleAddTask = useCallback(() => { setEditingTask(null); setShowTaskModal(true); }, []);
  const handleEditTask = useCallback(task => { setEditingTask(task); setShowTaskModal(true); }, []);

  const handleSaveTask = useCallback(async (task, repeat = 'none') => {
    const isNew = !editingTask;

    // If user selected a repeat pattern on a new task, create a recurring template
    if (isNew && repeat && repeat !== 'none') {
      const startDate = new Date(task.scheduledStart);
      const tmpl = {
        id: 'rec_' + uuid(),
        title: task.title,
        description: task.description,
        duration: task.duration,
        complexity: task.complexity,
        manualRank: task.manualRank || '',
        hour: startDate.getHours(),
        minute: startDate.getMinutes(),
        recurrenceType: repeat,
        weekday: startDate.getDay(),
        lastGenerated: startDate.toISOString().split('T')[0],
        active: true,
        createdAt: new Date().toISOString()
      };
      const newRecurring = [...recurringTasks, tmpl];
      setRecurringTasks(newRecurring);
      await save('recurring', { recurring: newRecurring });
      task = { ...task, parentRecurringId: tmpl.id };
      showToast(`Repeat saved · ${describeRecurrence(tmpl)}`, 'success', '🔁');
    }

    // Mark as pending calendar sync if sync is on; cleared when sync succeeds
    const taskWithFlag = settings.calendarSync && isNew ? { ...task, pendingCalendarSync: true } : task;
    const newTasks = isNew ? [...tasks, taskWithFlag] : tasks.map(t => t.id === task.id ? task : t);
    setTasks(newTasks);
    setShowTaskModal(false);
    setEditingTask(null);
    await save('tasks', { tasks: newTasks });

    if (!settings.calendarSync) {
      showToast(isNew ? `Task created · +${task.xpReward} XP on completion` : 'Task updated', 'success', '📋');
      return;
    }

    // Try silent refresh if token is stale
    const ok = await ensureFreshToken();
    if (ok) setCalConnected(true);

    if (!ok) {
      // No token, can't sync now — leave the pending flag, retry loop will catch up
      showToast(isNew ? 'Task saved · will sync to calendar when online ⏳' : 'Task updated locally · sync pending', 'info', '⏳');
      return;
    }

    if (isNew && !task.calendarEventId) {
      const evId = await createCalEvent(task);
      if (evId) {
        const finalTasks = newTasks.map(t => t.id === task.id ? { ...t, calendarEventId: evId, pendingCalendarSync: false } : t);
        setTasks(finalTasks);
        await save('tasks', { tasks: finalTasks });
        showToast('Task saved · added to calendar 📅', 'success', '✅');
      } else {
        showToast('Task saved · will retry calendar sync ⏳', 'info', '⏳');
      }
    } else if (!isNew && task.calendarEventId) {
      const updateOk = await updateCalEvent(task.calendarEventId, task);
      showToast(updateOk ? 'Task updated · calendar updated 📅' : 'Task updated · calendar sync pending', updateOk ? 'success' : 'info', updateOk ? '✅' : '⏳');
    } else {
      showToast(isNew ? 'Task created' : 'Task updated', 'success', '📋');
    }
  }, [tasks, recurringTasks, editingTask, settings.calendarSync, showToast]);

  const handleStartTask = useCallback(async (id) => {
    const newTasks = tasks.map(t => t.id === id ? { ...t, status: 'in_progress' } : t);
    setTasks(newTasks);
    await save('tasks', { tasks: newTasks });
    showToast('Task started — focus mode!', 'info', '▶️');
  }, [tasks, showToast]);

  const handleCompleteTask = useCallback(async (id) => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const now = new Date();
    const isLate = now > new Date(task.scheduledEnd);
    let xpEarned = task.xpReward, coinsEarned = task.coinReward;

    const streakBonus = 1 + Math.min((profile.streakDays||0) * 0.10, 0.70);
    xpEarned = Math.floor(xpEarned * streakBonus);
    coinsEarned = Math.floor(coinsEarned * streakBonus);

    if (isLate) {
      const minsLate = Math.floor((now - new Date(task.scheduledEnd)) / 60000);
      const penalty = settings.penaltyDifficulty;
      const mult = penalty === 'harsh' ? (minsLate<=15?0.75:minsLate<=30?0.60:minsLate<=60?0.40:minsLate<=120?0.25:0.10) :
                   penalty === 'moderate' ? (minsLate<=15?0.85:minsLate<=30?0.75:minsLate<=60?0.60:0.40) :
                   (minsLate<=30?0.90:minsLate<=60?0.75:0.60);
      xpEarned = Math.floor(xpEarned * mult);
      coinsEarned = Math.floor(coinsEarned * mult);
    } else {
      xpEarned = Math.floor(xpEarned * 1.25);
      coinsEarned = Math.floor(coinsEarned * 1.25);
    }

    let newP = { ...profile };
    const today = new Date().toDateString();
    const last = newP.lastActiveDate ? new Date(newP.lastActiveDate).toDateString() : null;
    const yesterday = new Date(Date.now()-86400000).toDateString();
    if (last !== today) {
      newP.streakDays = last === yesterday ? (newP.streakDays || 0) + 1 : 1;
      if (newP.streakDays > (newP.bestStreak||0)) newP.bestStreak = newP.streakDays;
    }
    newP.lastActiveDate = new Date().toISOString();
    newP.totalTasks = (newP.totalTasks||0) + 1;
    if (['S','SS','SSS'].includes(task.rank)) newP.sRankTasks = (newP.sRankTasks||0) + 1;
    if (task.rank === 'SSS') newP.sssRankTasks = (newP.sssRankTasks||0) + 1;

    Object.keys(task.statGains || {}).forEach(s => {
      newP.stats[s] = Math.max(10, (newP.stats[s]||10) + (task.statGains[s]||0));
    });

    newP = applyXPAndCoins(newP, xpEarned, coinsEarned);
    newP = checkAchievements(newP);

    const newStatus = isLate ? 'late' : 'completed';
    const newTasks = tasks.map(t => t.id === id ? { ...t, status: newStatus, completedAt: now.toISOString() } : t);

    setProfile(newP);
    setTasks(newTasks);
    await save('user_profile', newP);
    await save('tasks', { tasks: newTasks });

    setCompletionResult({ task, rewards: { xp: xpEarned, coins: coinsEarned }, isLate, isFailure: false });
  }, [tasks, profile, settings, applyXPAndCoins, checkAchievements]);

  const handleFailTask = useCallback(async (id) => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const penalty = settings.penaltyDifficulty;
    const coinLostMult = penalty === 'harsh' ? 0.75 : penalty === 'moderate' ? 0.50 : 0.25;
    const xpLostMult = penalty === 'harsh' ? 0.50 : penalty === 'moderate' ? 0.25 : 0;
    const coinsLost = Math.min(Math.floor(task.coinReward * coinLostMult), profile.coins);
    const xpLost = Math.floor(task.xpReward * xpLostMult);

    let newP = { ...profile };
    newP.coins = Math.max(0, newP.coins - coinsLost);
    newP.currentXP = Math.max(0, newP.currentXP - xpLost);
    newP.stats.discipline = Math.max(10, (newP.stats.discipline||10) - 3);
    newP.stats.momentum = Math.max(10, (newP.stats.momentum||10) - 10);
    if (penalty === 'harsh') newP.streakDays = 0;

    const newTasks = tasks.map(t => t.id === id ? { ...t, status: 'failed', completedAt: new Date().toISOString() } : t);
    setProfile(newP);
    setTasks(newTasks);
    await save('user_profile', newP);
    await save('tasks', { tasks: newTasks });

    setCompletionResult({ task, rewards: { xpLost, coinsLost }, isLate: false, isFailure: true });
  }, [tasks, profile, settings]);

  const handleDeleteTask = useCallback(async (id) => {
    const task = tasks.find(t => t.id === id);
    if (task?.calendarEventId) deleteCalEvent(task.calendarEventId);
    const newTasks = tasks.filter(t => t.id !== id);
    setTasks(newTasks);
    await save('tasks', { tasks: newTasks });
    showToast('Task removed', 'info', '🗑️');
  }, [tasks, showToast]);

  const handleBuyItem = useCallback(async (item) => {
    if (profile.coins < item.cost) { showToast('Not enough coins!', 'error', '❌'); return; }
    const newP = { ...profile, coins: profile.coins - item.cost };
    let newInv = { ...inventory };

    if (item.perm) {
      newInv.permanentItems = [...newInv.permanentItems, { id: uuid(), itemId: item.id, name: item.name, effect: item.effect, purchasedAt: new Date().toISOString() }];
    } else if (item.consumable) {
      const existing = newInv.consumables.find(c => c.itemId === item.id);
      if (existing) {
        newInv.consumables = newInv.consumables.map(c => c.itemId === item.id ? { ...c, quantity: c.quantity + 1 } : c);
      } else {
        newInv.consumables = [...newInv.consumables, { id: uuid(), itemId: item.id, name: item.name, quantity: 1, effect: item.effect }];
      }
    } else if (item.reward) {
      newInv.rewardTickets = [...newInv.rewardTickets, { id: uuid(), itemId: item.id, name: item.name, cost: item.cost, purchasedAt: new Date().toISOString(), redeemedAt: null, dur: item.dur }];
    }
    setProfile(newP);
    setInventory(newInv);
    await save('user_profile', newP);
    await save('inventory', newInv);
    showToast(`${item.icon} ${item.name} purchased`, 'success', '🛍️');
  }, [profile, inventory, showToast]);

  const handleUseItem = useCallback(async (consumableId) => {
    const c = inventory.consumables.find(i => i.id === consumableId);
    if (!c || c.quantity <= 0) return;
    const newInv = { ...inventory, consumables: inventory.consumables.map(i => i.id === consumableId ? { ...i, quantity: i.quantity - 1 } : i).filter(i => i.quantity > 0) };
    if (c.effect?.resetPenalties) {
      const newP = { ...profile };
      Object.keys(newP.stats).forEach(s => { if (newP.stats[s] < 20) newP.stats[s] = 20; });
      setProfile(newP);
      await save('user_profile', newP);
    } else {
      const buff = { id: uuid(), name: c.name, effect: c.effect, expiresAt: c.effect?.durMins ? addMinutes(new Date().toISOString(), c.effect.durMins) : null };
      newInv.activeBuffs = [...(newInv.activeBuffs||[]), buff];
    }
    setInventory(newInv);
    await save('inventory', newInv);
    showToast(`${c.name} activated`, 'success', '⚡');
  }, [inventory, profile, showToast]);

  const handleRedeemReward = useCallback(async (ticketId) => {
    const ticket = inventory.rewardTickets.find(t => t.id === ticketId);
    if (!ticket) return;
    const evId = (settings.calendarSync && calConnected) ? await createRewardCalEvent(ticket) : null;
    const newInv = { ...inventory, rewardTickets: inventory.rewardTickets.map(t => t.id === ticketId ? { ...t, redeemedAt: new Date().toISOString(), calendarEventId: evId } : t) };
    setInventory(newInv);
    await save('inventory', newInv);
    showToast(`🎁 Reward redeemed${evId ? ' — added to calendar' : ''}`, 'success', '🎁');
  }, [inventory, settings.calendarSync, calConnected, showToast]);

  const handleSaveSettings = useCallback(async (s) => { setSettings(s); await save('settings', s); }, []);
  const handleUpdateName = useCallback(async (name) => { const newP = { ...profile, characterName: name }; setProfile(newP); await save('user_profile', newP); }, [profile]);

  const handleCalendarConnect = useCallback(async () => {
    showToast('Opening Google sign-in...', 'info', '🔄');
    // Pause auto-sync during the connect transition
    setDriveSyncHook(null);
    if (syncTimerRef.current) { clearTimeout(syncTimerRef.current); syncTimerRef.current = null; }

    const ok = await requestCalendarAuth();
    if (!ok) {
      setDriveSyncHook(scheduleDriveSync);
      showToast('Sign-in failed — check console & authorized origins', 'error', '❌');
      setSyncStatus('error');
      return;
    }
    setCalConnected(true);
    setSyncStatus('syncing');
    showToast('Connected! Checking cloud...', 'success', '☁️');

    // Always check Drive FIRST so we don't overwrite cloud with local
    let restoredFromCloud = false;
    try {
      const drive = await loadDriveData();
      if (drive && drive.profile) {
        const localTime = localStorage.getItem('grind_lastSync');
        const driveTime = drive.syncedAt;
        if (!localTime || (driveTime && new Date(driveTime) > new Date(localTime))) {
          if (drive.profile)   await save('user_profile', drive.profile);
          if (drive.tasks)     await save('tasks', drive.tasks);
          if (drive.inventory) await save('inventory', drive.inventory);
          if (drive.settings)  await save('settings', { ...drive.settings, calendarSync: true });
          if (drive.recurring) await save('recurring', drive.recurring);
          const loadedTasks = drive.tasks?.tasks || [];
          const loadedRecurring = drive.recurring?.recurring || [];
          const gen = generateRecurringInstances(loadedRecurring, loadedTasks);
          if (gen.createdCount > 0) {
            await save('tasks', { tasks: gen.updatedTasks });
            await save('recurring', { recurring: gen.updatedRecurring });
          }
          setProfile(drive.profile);
          setTasks(gen.updatedTasks);
          setRecurringTasks(gen.updatedRecurring);
          setInventory(drive.inventory || defaultInventory());
          setSettings({ ...(drive.settings || defaultSettings()), calendarSync: true });
          localStorage.setItem('grind_lastSync', drive.syncedAt);
          restoredFromCloud = true;
          showToast('Restored data from cloud ☁️', 'success', '✨');
        }
      }
    } catch(e) { console.warn('Drive restore failed', e); }

    if (!restoredFromCloud) {
      const newS = { ...settings, calendarSync: true };
      setSettings(newS);
      await save('settings', newS);
    }

    // Re-enable auto-sync, then push current state to Drive
    setDriveSyncHook(scheduleDriveSync);
    const ok2 = await performDriveSync();
    if (ok2 !== false) showToast('All data synced ☁️', 'success', '✅');
  }, [settings, showToast, scheduleDriveSync, performDriveSync]);

  const handleCalendarDisconnect = useCallback(async () => {
    disconnectCalendar();
    setCalConnected(false);
    setSyncStatus('offline');
    const newS = { ...settings, calendarSync: false };
    setSettings(newS); await save('settings', newS);
    showToast('Disconnected from Google', 'info', '☁️');
  }, [settings, showToast]);

  const handleDeleteRecurring = useCallback(async (recId) => {
    const newRecurring = recurringTasks.filter(r => r.id !== recId);
    setRecurringTasks(newRecurring);
    await save('recurring', { recurring: newRecurring });
    showToast('Repeat stopped — existing tasks kept', 'info', '🔁');
  }, [recurringTasks, showToast]);

  const handleResetProfile = useCallback(async () => {
    if (!confirm('Reset ALL progress? This cannot be undone!')) return;
    const p = defaultProfile();
    setProfile(p);
    setInventory(defaultInventory());
    setSettings(defaultSettings());
    setTasks([]);
    setRecurringTasks([]);
    await Promise.all([
      save('user_profile', p),
      save('tasks', { tasks: [] }),
      save('inventory', defaultInventory()),
      save('settings', defaultSettings()),
      save('recurring', { recurring: [] })
    ]);
    setShowWelcome(true);
  }, []);

  const handleRestoreFromCloud = useCallback(async () => {
    showToast('Opening Google sign-in...', 'info', '☁️');
    setDriveSyncHook(null); // Pause auto-sync during restore
    const ok = await requestCalendarAuth();
    if (!ok) {
      setDriveSyncHook(scheduleDriveSync);
      showToast('Sign-in failed', 'error', '❌');
      return false;
    }
    setCalConnected(true);
    try {
      const drive = await loadDriveData();
      if (drive && drive.profile) {
        await save('user_profile', drive.profile);
        if (drive.tasks)     await save('tasks', drive.tasks);
        if (drive.inventory) await save('inventory', drive.inventory);
        if (drive.settings)  await save('settings', { ...drive.settings, calendarSync: true });
        if (drive.recurring) await save('recurring', drive.recurring);
        const loadedTasks = drive.tasks?.tasks || [];
        const loadedRecurring = drive.recurring?.recurring || [];
        const gen = generateRecurringInstances(loadedRecurring, loadedTasks);
        if (gen.createdCount > 0) {
          await save('tasks', { tasks: gen.updatedTasks });
          await save('recurring', { recurring: gen.updatedRecurring });
        }
        localStorage.setItem('grind_lastSync', drive.syncedAt || new Date().toISOString());
        setProfile(drive.profile);
        setTasks(gen.updatedTasks);
        setRecurringTasks(gen.updatedRecurring);
        setInventory(drive.inventory || defaultInventory());
        setSettings({ ...(drive.settings || defaultSettings()), calendarSync: true });
        setShowWelcome(false);
        setSyncStatus('synced');
        setDriveSyncHook(scheduleDriveSync);
        showToast('Welcome back! Data restored ✨', 'success', '☁️');
        return true;
      } else {
        setDriveSyncHook(scheduleDriveSync);
        showToast('No previous data found in your Drive', 'info', '☁️');
        return false;
      }
    } catch(e) {
      setDriveSyncHook(scheduleDriveSync);
      showToast('Restore failed — check console', 'error', '❌');
      return false;
    }
  }, [showToast, scheduleDriveSync]);

  if (loading) return <LoadingScreen message={loadingMsg} />;
  if (showWelcome) return <WelcomeScreen onStart={handleWelcomeStart} onRestore={handleRestoreFromCloud} />;
  if (!profile) return <LoadingScreen />;

  const pendingCount = tasks.filter(t => t.status === 'pending' && isToday(t.scheduledStart)).length;

  return (
    <div className="min-h-screen">
      <Header profile={profile} calendarConnected={calConnected} syncStatus={syncStatus} />
      <div className="flex">
        <Sidebar view={view} onNav={setView} taskCount={pendingCount} profile={profile} />
        <main className="flex-1 p-4 sm:p-5 lg:p-6 main-area min-w-0 max-w-7xl">
          {view === 'dashboard' && <DashboardView profile={profile} tasks={tasks} onAddTask={handleAddTask} onStartTask={handleStartTask} onCompleteTask={handleCompleteTask} onFailTask={handleFailTask} onDeleteTask={handleDeleteTask} onEditTask={handleEditTask} />}
          {view === 'tasks' && <TasksView tasks={tasks} recurringTasks={recurringTasks} onAddTask={handleAddTask} onStartTask={handleStartTask} onCompleteTask={handleCompleteTask} onFailTask={handleFailTask} onDeleteTask={handleDeleteTask} onEditTask={handleEditTask} onDeleteRecurring={handleDeleteRecurring} />}
          {view === 'shop' && <ShopView profile={profile} inventory={inventory} onBuy={handleBuyItem} />}
          {view === 'inventory' && <InventoryView inventory={inventory} onUseItem={handleUseItem} onRedeemReward={handleRedeemReward} />}
          {view === 'story' && <StoryView profile={profile} />}
          {view === 'analytics' && <AnalyticsView profile={profile} tasks={tasks} />}
          {view === 'settings' && <SettingsView settings={settings} profile={profile} onSaveSettings={handleSaveSettings} onResetProfile={handleResetProfile} onUpdateName={handleUpdateName} calendarConnected={calConnected} onCalendarConnect={handleCalendarConnect} onCalendarDisconnect={handleCalendarDisconnect} />}
        </main>
      </div>

      {showTaskModal && <TaskModal task={editingTask} onSave={handleSaveTask} onClose={() => { setShowTaskModal(false); setEditingTask(null); }} />}
      {levelUpData && <LevelUpModal levels={levelUpData.levelsGained} newLevel={levelUpData.newLevel} onClose={() => setLevelUpData(null)} />}
      {completionResult && <CompletionModal result={completionResult} onClose={() => setCompletionResult(null)} />}

      <div className="toast-container">
        {toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} icon={t.icon} />)}
      </div>
      {achievementToasts.slice(-3).map((ach, i) => (
        <div key={ach._id} style={{ top: `${80 + i*100}px`, position:'fixed', right:'16px', zIndex:9999 }}>
          <AchievementToast ach={ach} onClose={() => setAchievementToasts(prev => prev.filter(a => a._id !== ach._id))} />
        </div>
      ))}
    </div>
  );
};

// ── Error Boundary & Mount ────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  state = { hasError: false };
  static getDerivedStateFromError() { return { hasError: true }; }
  componentDidCatch(e) { console.error('App error:', e); }
  render() {
    if (this.state.hasError) return (
      <div className="min-h-screen flex items-center justify-center text-white p-4">
        <div className="text-center card max-w-sm">
          <div className="text-5xl mb-4">⚠️</div>
          <h2 className="font-display text-xl mb-2">Something went wrong</h2>
          <p className="text-gray-400 text-sm mb-4">Your data is safe. Refresh to continue.</p>
          <button className="btn btn-primary" onClick={() => window.location.reload()}>Reload App</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
