    const manifest = {
      name: "The GRIND",
      short_name: "GRIND",
      description: "Daily execution. No excuses.",
      start_url: ".",
      scope: ".",
      display: "standalone",

      icons: [

        { src: iconSvg, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }

    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Google Calendar Configuration ─────────────────────────────────────────────
const GOOGLE_CLIENT_ID = '1015425176244-rdgo5rcmkmvdn2jtk0jppndd00uhus44.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/drive.appdata';
const GOOGLE_DISCOVERY = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
const DRIVE_DISCOVERY = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';

let tokenClient = null;
let gapiInited = false;
let gisInited = false;

const initGoogleAPIs = () => new Promise((resolve) => {
  let attempts = 0;
  const tryInit = () => {
    attempts++;
    if (attempts > 60) return resolve(false);
    const hasGapi = window.gapi && !gapiInited;
    const hasGis = window.google?.accounts?.oauth2 && !gisInited;
    if (hasGapi) {
      window.gapi.load('client', async () => {
        try {
          await window.gapi.client.init({ discoveryDocs: [GOOGLE_DISCOVERY, DRIVE_DISCOVERY] });
          gapiInited = true;
        } catch(e) { console.warn('gapi init failed', e); }
      });
    }
    if (hasGis) {
      try {
        tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: GOOGLE_SCOPES,
          callback: () => {}
        });
        gisInited = true;
      } catch(e) {}
    }
    if (gapiInited && gisInited) return resolve(true);
    setTimeout(tryInit, 200);
  };
  tryInit();
});

const requestCalendarAuth = () => new Promise((resolve) => {
  if (!tokenClient) return resolve(false);
  tokenClient.callback = (resp) => {
    if (resp.error) return resolve(false);
    try { localStorage.setItem('grind_gtoken', JSON.stringify({ token: resp.access_token, expires: Date.now() + (resp.expires_in*1000) })); } catch(e) {}
    if (window.gapi?.client) window.gapi.client.setToken({ access_token: resp.access_token });
    resolve(true);
  };
  try {
    const existing = JSON.parse(localStorage.getItem('grind_gtoken') || 'null');
    if (existing?.token && existing.expires > Date.now() + 60000) {
      window.gapi.client.setToken({ access_token: existing.token });
      return resolve(true);
    }
  } catch(e) {}
  tokenClient.requestAccessToken({ prompt: 'consent' });
});

const restoreToken = () => {
  try {
    const existing = JSON.parse(localStorage.getItem('grind_gtoken') || 'null');
    if (existing?.token && existing.expires > Date.now() + 60000 && window.gapi?.client) {
      window.gapi.client.setToken({ access_token: existing.token });
      return true;
    }
  } catch(e) {}
  return false;
};

const isCalendarConnected = () => {
  try {
    const t = JSON.parse(localStorage.getItem('grind_gtoken') || 'null');
    return !!(t?.token && t.expires > Date.now() + 60000);
  } catch(e) { return false; }
};

const isGoogleConnected = isCalendarConnected;

// Silent token refresh — works if user has an active Google session.
// No popup, no consent screen — just a quiet token swap behind the scenes.
const silentRefresh = () => new Promise((resolve) => {
  if (!tokenClient) return resolve(false);
  tokenClient.callback = (resp) => {
    if (resp.error || !resp.access_token) return resolve(false);
    try { localStorage.setItem('grind_gtoken', JSON.stringify({ token: resp.access_token, expires: Date.now() + (resp.expires_in*1000) })); } catch(e) {}
    if (window.gapi?.client) window.gapi.client.setToken({ access_token: resp.access_token });
    resolve(true);
  };
  try { tokenClient.requestAccessToken({ prompt: '' }); }
  catch(e) { resolve(false); }
});

// Ensure we have a fresh token; refresh silently if not
const ensureFreshToken = async () => {
  if (isCalendarConnected()) return true;
  return await silentRefresh();
};

const disconnectCalendar = () => {
  try {
    const t = JSON.parse(localStorage.getItem('grind_gtoken') || 'null');
    if (t?.token && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(t.token, () => {});
    }
    localStorage.removeItem('grind_gtoken');
    if (window.gapi?.client) window.gapi.client.setToken(null);
    driveFileId = null;
  } catch(e) {}
};

    ['user_profile','tasks','inventory','settings','gtoken'].forEach(k => {

// Drive sync hook — set by App after init; storage.set will call it on writes
let _driveSyncHook = null;
const setDriveSyncHook = (fn) => { _driveSyncHook = fn; };

const storage = {
  async get(key) {
    try { if (window.storage && window.storage !== storage) return await window.storage.get(key); } catch(e) {}
    const v = localStorage.getItem('grind_' + key);
    return v ? { value: v } : null;
  },
  async set(key, value) {
    try { if (window.storage && window.storage !== storage) return await window.storage.set(key, value); } catch(e) {}
    localStorage.setItem('grind_' + key, value);
    if (_driveSyncHook) _driveSyncHook();
    return true;
  }
};

// ── Google Drive sync (appDataFolder — hidden, app-private) ──────────────────
const DRIVE_FILE = 'grind_data.json';
let driveFileId = null;
let lastDriveSyncAt = null;
let driveSyncing = false;

const findDriveFile = async () => {
  if (!isGoogleConnected() || !window.gapi?.client?.drive) return null;
  restoreToken();
  try {
    const r = await window.gapi.client.drive.files.list({
      q: `name='${DRIVE_FILE}' and trashed=false`,
      spaces: 'appDataFolder',
      fields: 'files(id,name,modifiedTime)'
    });
    return r.result?.files?.[0] || null;
  } catch(e) { console.warn('Drive list failed', e); return null; }
};

const loadDriveData = async () => {
  const file = await findDriveFile();
  if (!file) return null;
  driveFileId = file.id;
  try {
    const r = await window.gapi.client.drive.files.get({ fileId: file.id, alt: 'media' });
    return typeof r.result === 'string' ? JSON.parse(r.result) : (r.result || JSON.parse(r.body));
  } catch(e) { console.warn('Drive load failed', e); return null; }
};

const saveDriveData = async (payload) => {
  if (!isGoogleConnected()) return false;
  if (!window.gapi?.client) return false;
  restoreToken();
  const body = JSON.stringify({ ...payload, syncedAt: new Date().toISOString() });
  try {
    if (!driveFileId) {
      const existing = await findDriveFile();
      if (existing) driveFileId = existing.id;
    }
    const token = window.gapi.client.getToken();
    if (!token) return false;
    const boundary = '----grindsync' + Date.now();
    const metadata = driveFileId ? {} : { name: DRIVE_FILE, parents: ['appDataFolder'] };
    if (!driveFileId) {
      const multipart =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
        JSON.stringify(metadata) +
        `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
        body +
        `\r\n--${boundary}--`;
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + token.access_token,
          'Content-Type': `multipart/related; boundary=${boundary}`
        },
        body: multipart
      });
      if (!res.ok) throw new Error('create failed ' + res.status);
      const data = await res.json();
      driveFileId = data.id;
    } else {
      const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: {
          Authorization: 'Bearer ' + token.access_token,
          'Content-Type': 'application/json'
        },
        body
      });
      if (!res.ok) throw new Error('update failed ' + res.status);
    }
    lastDriveSyncAt = new Date().toISOString();
    return true;
  } catch(e) { console.warn('Drive save failed', e); return false; }
};

// ── Game Formulas ─────────────────────────────────────────────────────────────
const calcRank = (mins, complexity) => {
  const dp = mins < 15 ? 1 : mins < 30 ? 2 : mins < 60 ? 3 : mins < 120 ? 5 : mins < 180 ? 8 : mins < 240 ? 12 : 20;
  const total = dp * 1.5 + complexity * 2;
  if (total <= 5) return 'E'; if (total <= 10) return 'D'; if (total <= 15) return 'C';
  if (total <= 22) return 'B'; if (total <= 30) return 'A'; if (total <= 40) return 'S';
  if (total <= 50) return 'SS'; return 'SSS';
};

const getXPForLevel = l => l <= 10 ? 100 * l : l <= 25 ? 250 * (l-10) + 1000 : l <= 50 ? 500 * (l-25) + 4750 : 1000 * (l-50) + 17250;

const processLevelUp = (lvl, xp, toNext) => {
  let level = lvl, x = xp, next = toNext, gained = 0;
  while (x >= next) { x -= next; level++; gained++; next = getXPForLevel(level); }
  return { level, xp: x, xpToNextLevel: next, levelsGained: gained };
};

const recurrenceMatches = (tmpl, date) => {
  const day = date.getDay();

    case 'daily':    return true;
    case 'weekdays': return day >= 1 && day <= 5;
    case 'weekends': return day === 0 || day === 6;
    case 'weekly':   return day === (tmpl.weekday ?? 1);
    default: return false;
  }
};

const describeRecurrence = (tmpl) => {
  if (!tmpl) return '';
  switch (tmpl.recurrenceType) {
    case 'daily':    return 'Every day';
    case 'weekdays': return 'Weekdays (Mon–Fri)';
    case 'weekends': return 'Weekends (Sat–Sun)';
    case 'weekly':   return `Every ${WEEKDAYS[tmpl.weekday ?? 1]}`;
    default: return '';
  }
};

// Generate any missing instances from `tmpl.lastGenerated` up through today
const generateRecurringInstances = (recurringTasks, existingTasks) => {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const todayKey = today.toISOString().split('T')[0];

  let updatedTasks = [...existingTasks];
  let updatedRecurring = recurringTasks.map(tmpl => ({ ...tmpl }));
  let createdCount = 0;

  for (const tmpl of updatedRecurring) {
    if (!tmpl.active) continue;
    const startBase = tmpl.lastGenerated || (tmpl.createdAt || '').split('T')[0];
    if (!startBase) continue;
    const cursor = new Date(startBase + 'T00:00:00');
    cursor.setDate(cursor.getDate() + 1); // day after last generation

    while (cursor <= today) {
      if (recurrenceMatches(tmpl, cursor)) {
        const dateKey = cursor.toISOString().split('T')[0];
        const alreadyExists = updatedTasks.some(t =>
          t.parentRecurringId === tmpl.id && t.scheduledStart.startsWith(dateKey)
        );
        if (!alreadyExists) {
          const start = new Date(cursor);
          start.setHours(tmpl.hour || 9, tmpl.minute || 0, 0, 0);
          const end = new Date(start.getTime() + (tmpl.duration || 60) * 60000);
          const rank = tmpl.manualRank || calcRank(tmpl.duration || 60, tmpl.complexity || 3);
          const rewards = RANK_REWARDS[rank] || RANK_REWARDS.C;
          updatedTasks.push({
            id: uuid(),
            title: tmpl.title,
            description: tmpl.description || '',
            duration: tmpl.duration || 60,
            complexity: tmpl.complexity || 3,
            rank,
            manualRank: tmpl.manualRank || '',
            scheduledStart: start.toISOString(),
            scheduledEnd: end.toISOString(),
            status: 'pending',
            xpReward: rewards.xp,
            coinReward: rewards.coins,
            statGains: rewards.stats,
            parentRecurringId: tmpl.id,
            calendarEventId: null,
            pendingCalendarSync: true,   // retry loop will catch this up if sync is on
            createdAt: new Date().toISOString()
          });
          createdCount++;
        }
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    tmpl.lastGenerated = todayKey;
  }

  return { updatedTasks, updatedRecurring, createdCount };
};

// ── Google Calendar Operations ────────────────────────────────────────────────
const CAL_COLORS = { E:'8', D:'2', C:'7', B:'3', A:'5', S:'11', SS:'4', SSS:'9' };

const createCalEvent = async (task) => {
  if (!isCalendarConnected() || !window.gapi?.client?.calendar) return null;
  restoreToken();
  try {
    const ev = {
      summary: `[${task.rank}] ${task.title}`,
      description: `Rank: ${task.rank} | XP: ${task.xpReward} | Coins: ${task.coinReward}${task.description ? '\n\n' + task.description : ''}`,
      start: { dateTime: task.scheduledStart, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: task.scheduledEnd,   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: CAL_COLORS[task.rank] || '9',
      reminders: { useDefault: false, overrides: [{ method:'popup', minutes:10 }] }
    };
    const r = await window.gapi.client.calendar.events.insert({ calendarId:'primary', resource: ev });
    return r.result?.id || null;
  } catch (e) { console.warn('Calendar create failed:', e); return null; }
};

const updateCalEvent = async (eventId, task) => {
  if (!isCalendarConnected() || !window.gapi?.client?.calendar || !eventId) return false;
  restoreToken();
  try {
    await window.gapi.client.calendar.events.update({
      calendarId: 'primary', eventId,
      resource: {
        summary: `[${task.rank}] ${task.title}`,
        description: `Rank: ${task.rank} | XP: ${task.xpReward} | Coins: ${task.coinReward}`,
        start: { dateTime: task.scheduledStart, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end:   { dateTime: task.scheduledEnd,   timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        colorId: CAL_COLORS[task.rank] || '9'
      }
    });
    return true;
  } catch(e) { return false; }
};

const deleteCalEvent = async (eventId) => {
  if (!isCalendarConnected() || !window.gapi?.client?.calendar || !eventId) return;
  restoreToken();
  try { await window.gapi.client.calendar.events.delete({ calendarId:'primary', eventId }); } catch(e) {}
};

const createRewardCalEvent = async (reward) => {
  if (!isCalendarConnected() || !window.gapi?.client?.calendar) return null;
  restoreToken();
  try {
    const start = getNextSlot();
    const ev = {
      summary: `🎁 REWARD: ${reward.name}`,
      description: `Earned reward — enjoy guilt-free! Cost: ${reward.cost} coins`,
      start: { dateTime: start, timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      end:   { dateTime: addMinutes(start, reward.dur || 60), timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
      colorId: '5',
      reminders: { useDefault:false, overrides:[{method:'popup',minutes:30}] }
    };
    const r = await window.gapi.client.calendar.events.insert({ calendarId:'primary', resource:ev });
    return r.result?.id || null;
  } catch(e) { return null; }
};

// ── Task Modal ────────────────────────────────────────────────────────────────
const fmtDur = (m) => {
  m = Math.max(0, m | 0);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60), mn = m % 60;
  return mn ? `${h}h ${mn}m` : `${h}h`;
};
const complexityLabel = (c) =>
  c <= 2 ? 'Trivial' : c <= 4 ? 'Routine' : c <= 6 ? 'Moderate' : c <= 8 ? 'Challenging' : 'Expert';

const TaskModal = ({ task, onSave, onClose }) => {
  const [title, setTitle] = useState(task?.title || '');
  const [desc, setDesc] = useState(task?.description || '');
  // Both inputs stored as STRINGS so the user can freely type/clear without snap-back
  const [durationStr, setDurationStr] = useState(String(task?.duration || 60));
  const [complexityStr, setComplexityStr] = useState(String(task?.complexity || 3));
  const [start, setStart] = useState(fmtDTLocal(task?.scheduledStart || getNextSlot()));
  const [manualRank, setManualRank] = useState(task?.manualRank || '');
  // Repeat — only for new tasks (instances of an existing repeat are edited as one-offs)
  const [repeat, setRepeat] = useState('none');
  const isEditing = !!task;

  // Derive numeric values for preview/calculations (don't force-update the inputs)
  const durationNum = (() => { const n = parseInt(durationStr); return isNaN(n) ? 0 : n; })();
  const complexityNum = (() => { const n = parseInt(complexityStr); return isNaN(n) ? 0 : n; })();
  const previewDuration = Math.max(1, durationNum);
  const previewComplexity = Math.min(10, Math.max(1, complexityNum || 1));
  const rank = manualRank || calcRank(previewDuration, previewComplexity);
  const rewards = RANK_REWARDS[rank] || RANK_REWARDS.C;

  const handleSave = () => {
    if (!title.trim()) return;
    const finalDuration = Math.max(5, durationNum || 60);
    const finalComplexity = Math.min(10, Math.max(1, complexityNum || 3));
    const startISO = new Date(start).toISOString();
    onSave({
      id: task?.id || uuid(),
      title: title.trim(),
      description: desc.trim(),
      duration: finalDuration,
      complexity: finalComplexity,
      rank, manualRank,
      scheduledStart: startISO,
      scheduledEnd: addMinutes(startISO, finalDuration),
      status: task?.status || 'pending',
      xpReward: rewards.xp,
      coinReward: rewards.coins,
      statGains: rewards.stats,
      calendarEventId: task?.calendarEventId || null,
      createdAt: task?.createdAt || new Date().toISOString()
    }, repeat);
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-content w-full max-w-md p-6 animate-scaleIn">
        <div className="flex justify-between items-center mb-5">
          <h3 className="font-display text-xl">{task ? '✏️ Edit Task' : '✨ New Task'}</h3>
          <button onClick={onClose} className="btn btn-ghost btn-icon">✕</button>
        </div>
        <div className="space-y-4">
          <div>
            <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Title</label>
            <input className="input" value={title} onChange={e => setTitle(e.target.value)} placeholder="What needs to be done?" autoFocus />
          </div>

          <div>
            <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Notes (optional)</label>
            <input className="input" value={desc} onChange={e => setDesc(e.target.value)} placeholder="Additional details..." />
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Duration (min)</label>
              <input
                className="input font-mono"
                type="number"
                inputMode="numeric"
                value={durationStr}
                onChange={e => setDurationStr(e.target.value.replace(/[^0-9]/g, ''))}
                onBlur={() => { if (!durationStr || parseInt(durationStr) < 1) setDurationStr('5'); }}
                placeholder="60"
              />
              <div className="text-[11px] text-gray-500 mt-1 ml-1">{durationNum > 0 ? fmtDur(durationNum) : '—'}</div>
            </div>
            <div>
              <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Complexity (1–10)</label>
              <input
                className="input font-mono"
                type="number"
                inputMode="numeric"
                value={complexityStr}
                onChange={e => setComplexityStr(e.target.value.replace(/[^0-9]/g, ''))}
                onBlur={() => {
                  const n = parseInt(complexityStr);
                  if (!complexityStr || isNaN(n) || n < 1) setComplexityStr('1');
                  else if (n > 10) setComplexityStr('10');
                }}
                placeholder="3"
              />
              <div className="text-[11px] text-gray-500 mt-1 ml-1">{complexityNum > 0 ? complexityLabel(previewComplexity) : '—'}</div>
            </div>
          </div>

          <div>
            <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Scheduled Start</label>
            <input className="input" type="datetime-local" value={start} onChange={e => setStart(e.target.value)} />
          </div>

          {!isEditing && (
            <div>
              <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block flex items-center gap-1.5">
                <span>🔁 Repeat</span>
              </label>
              <div className="flex flex-wrap gap-1.5">
                {[
                  { id:'none',     label:'Once' },
                  { id:'daily',    label:'Daily' },
                  { id:'weekdays', label:'Mon–Fri' },
                  { id:'weekends', label:'Sat–Sun' },
                  { id:'weekly',   label:`Weekly · ${WEEKDAYS[new Date(start).getDay()]}` }
                ].map(opt => (
                  <button
                    key={opt.id}
                    type="button"
                    className={`tab-pill ${repeat === opt.id ? 'active' : ''}`}
                    onClick={() => setRepeat(opt.id)}
                  >
                    {opt.label}
                  </button>
                ))}
              </div>
              {repeat !== 'none' && (
                <p className="text-[11px] text-amber-300/70 mt-2">⚡ A copy will be auto-created each matching day at this time.</p>
              )}
            </div>
          )}

          <div>
            <label className="text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5 block">Override Rank (optional)</label>
            <select className="input" value={manualRank} onChange={e => setManualRank(e.target.value)}>
              <option value="">Auto → {calcRank(previewDuration, previewComplexity)}</option>
              {['E','D','C','B','A','S','SS','SSS'].map(r => <option key={r} value={r}>{r}</option>)}
            </select>
          </div>

          <div className="rounded-2xl p-4 bg-gradient-to-br from-amber-500/10 to-orange-500/5 border border-amber-500/20">
            <div className="text-[10px] font-bold text-amber-400 uppercase tracking-widest mb-2">Reward Preview</div>
            <div className="flex items-center justify-between">
              <RankBadge rank={rank} size="lg" />
              <div className="text-right">
                <div className="text-cyan-400 font-bold font-mono">+{rewards.xp} XP</div>
                <div className="text-amber-400 font-bold font-mono">+{rewards.coins} 🪙</div>
              </div>
            </div>
          </div>

          <button className="btn btn-primary btn-lg w-full" onClick={handleSave} disabled={!title.trim()}>
            {task ? 'Save Changes' : 'Create Task'}
          </button>
        </div>
      </div>
    </div>
  );
};

  const inProgress = today.filter(t => t.status === 'in_progress');

  const failed = today.filter(t => t.status === 'failed');

                    <span>{phase.icon}</span>
                    <span>{phase.name}</span>

          {/* In Progress */}
          {inProgress.length > 0 && (
            <div className="animate-fadeInUp">
              <h3 className="text-[11px] font-bold text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-blue-400 animate-glowPulse" />

            <div className="flex items-center justify-between mb-3">

              <button className="btn btn-primary btn-sm" onClick={onAddTask}>+ New Task</button>

              <div className="card text-center py-12 border-dashed">

                <p className="text-gray-500 text-sm mb-4">Start building your empire — one task at a time.</p>
                <button className="btn btn-primary" onClick={onAddTask}>Add Your First Task</button>

              <>
                {pending.map(t => <TaskCard key={t.id} task={t} onStart={onStartTask} onComplete={onCompleteTask} onFail={onFailTask} onDelete={onDeleteTask} onEdit={onEditTask} />)}
                {completed.length > 0 && (
                  <div className="mt-4">
                    <div className="text-[10px] text-emerald-500/80 uppercase tracking-widest mb-2 font-bold">✓ Completed ({completed.length})</div>
                    {completed.map(t => <TaskCard key={t.id} task={t} onStart={onStartTask} onComplete={onCompleteTask} onFail={onFailTask} onDelete={onDeleteTask} onEdit={onEditTask} />)}
                  </div>
                )}
                {failed.length > 0 && (
                  <div className="mt-4">
                    <div className="text-[10px] text-red-500/80 uppercase tracking-widest mb-2 font-bold">✕ Failed ({failed.length})</div>
                    {failed.map(t => <TaskCard key={t.id} task={t} onStart={onStartTask} onComplete={onCompleteTask} onFail={onFailTask} onDelete={onDeleteTask} onEdit={onEditTask} />)}
                  </div>
                )}
              </>
            )}
          </div>

          {/* Upcoming */}
          {upcoming.length > 0 && (
            <div className="animate-fadeInUp stagger-3">
              <h3 className="text-[11px] font-bold text-purple-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                <span>🔮</span> Coming Up
              </h3>
              {upcoming.map(t => <TaskCard key={t.id} task={t} onStart={onStartTask} onComplete={onCompleteTask} onFail={onFailTask} onDelete={onDeleteTask} onEdit={onEditTask} />)}

          )}

      </div>

};

// ── Tasks View ────────────────────────────────────────────────────────────────
const TasksView = ({ tasks, recurringTasks = [], onAddTask, onStartTask, onCompleteTask, onFailTask, onDeleteTask, onEditTask, onDeleteRecurring }) => {
  const [filter, setFilter] = useState('all');
  const [rankFilter, setRankFilter] = useState('all');
  const [sort, setSort] = useState('time');
  const [search, setSearch] = useState('');
  const [showRecurring, setShowRecurring] = useState(false);
  const activeRecurring = recurringTasks.filter(r => r.active);

  const filtered = tasks.filter(t => {
    if (filter === 'today' && !isToday(t.scheduledStart)) return false;
    if (filter === 'upcoming' && (isToday(t.scheduledStart) || isPast(t.scheduledStart))) return false;
    if (filter === 'pending' && t.status !== 'pending') return false;
    if (filter === 'completed' && !['completed','late'].includes(t.status)) return false;
    if (filter === 'failed' && t.status !== 'failed') return false;
    if (rankFilter !== 'all' && t.rank !== rankFilter) return false;
    if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).sort((a,b) => {
    if (sort === 'time') return new Date(a.scheduledStart) - new Date(b.scheduledStart);
    if (sort === 'rank') return ['SSS','SS','S','A','B','C','D','E'].indexOf(a.rank) - ['SSS','SS','S','A','B','C','D','E'].indexOf(b.rank);
    if (sort === 'xp') return b.xpReward - a.xpReward;
    return 0;
  });

  return (
    <div className="space-y-4 animate-fadeIn">
      <div className="flex flex-wrap gap-3 items-center justify-between">
        <h2 className="font-display text-2xl">All Tasks</h2>
        <button className="btn btn-primary" onClick={onAddTask}>+ New Task</button>
      </div>
      <input className="input" placeholder="🔍 Search tasks..." value={search} onChange={e => setSearch(e.target.value)} />

      {/* Recurring templates manager */}
      {activeRecurring.length > 0 && (
        <div className="card border border-purple-500/20 bg-gradient-to-br from-purple-500/5 to-transparent">
          <button className="w-full flex items-center justify-between text-left" onClick={() => setShowRecurring(s => !s)}>
            <div className="flex items-center gap-2">
              <span className="text-lg">🔁</span>
              <span className="font-bold text-sm">Repeating Tasks</span>
              <span className="text-[11px] text-purple-300 bg-purple-500/15 px-2 py-0.5 rounded-full font-bold">{activeRecurring.length}</span>
            </div>
            <span className="text-gray-500 text-sm">{showRecurring ? '▾' : '▸'}</span>
          </button>
          {showRecurring && (
            <div className="mt-3 space-y-2">
              {activeRecurring.map(r => (
                <div key={r.id} className="flex items-center justify-between gap-3 p-3 rounded-xl bg-white/[0.02] border border-white/5">
                  <div className="min-w-0 flex-1">
                    <div className="font-semibold text-sm truncate">{r.title}</div>
                    <div className="text-[11px] text-gray-500 mt-0.5 font-mono">
                      {describeRecurrence(r)} · {String(r.hour ?? 9).padStart(2,'0')}:{String(r.minute ?? 0).padStart(2,'0')} · {r.duration}m
                    </div>
                  </div>
                  <button
                    className="btn btn-ghost btn-sm shrink-0"
                    title="Delete repeat (stops future copies, keeps existing ones)"
                    onClick={() => {
                      if (confirm(`Stop repeating "${r.title}"? Existing instances stay, but no new ones will be created.`)) {
                        onDeleteRecurring(r.id);
                      }
                    }}
                  >🗑</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      <div className="flex flex-wrap gap-2">
        {['all','today','upcoming','pending','completed','failed'].map(f => (
          <button key={f} className={`tab-pill ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>
            {f === 'all' ? 'All' : f === 'today' ? '📅 Today' : f === 'upcoming' ? '🔮 Upcoming' : f === 'pending' ? '⏳ Pending' : f === 'completed' ? '✅ Done' : '❌ Failed'}
          </button>
        ))}
      </div>
      <div className="flex flex-wrap gap-2">
        <select className="input py-2 text-sm w-auto" value={rankFilter} onChange={e => setRankFilter(e.target.value)}>
          <option value="all">All Ranks</option>
          {['E','D','C','B','A','S','SS','SSS'].map(r => <option key={r} value={r}>Rank {r}</option>)}
        </select>
        <select className="input py-2 text-sm w-auto" value={sort} onChange={e => setSort(e.target.value)}>
          <option value="time">⏰ Sort: Time</option>
          <option value="rank">⭐ Sort: Rank</option>
          <option value="xp">💎 Sort: XP</option>
        </select>
      </div>
      {filtered.length === 0 ? (
        <div className="card text-center py-12 border-dashed">
          <div className="text-5xl mb-3">📋</div>
          <p className="text-gray-400">No tasks found.</p>
          <button className="btn btn-primary mt-4" onClick={onAddTask}>+ Add Task</button>
        </div>
      ) : (
        <div>
          {filtered.map(t => <TaskCard key={t.id} task={t} onStart={onStartTask} onComplete={onCompleteTask} onFail={onFailTask} onDelete={onDeleteTask} onEdit={onEditTask} />)}
        </div>
      )}
    </div>
  );
};

// ── Shop View ─────────────────────────────────────────────────────────────────
const ShopView = ({ profile, inventory, onBuy }) => {
  const [cat, setCat] = useState('office');
  const [search, setSearch] = useState('');

  const categories = [
    { id:'office', label:'🏢 Office', items: SHOP.office, desc:'Permanent upgrades' },
    { id:'equipment', label:'💻 Equipment', items: SHOP.equipment, desc:'Gear that boosts performance' },
    { id:'team', label:'👥 Team', items: SHOP.team, desc:'Hire allies for permanent buffs' },
    { id:'powerups', label:'⚡ Power-Ups', items: SHOP.powerups, desc:'Consumable boosts' },
    { id:'protection', label:'🛡️ Protection', items: SHOP.protection, desc:'Damage control' },
    { id:'breaks', label:'☕ Breaks', items: SHOP.breaks, desc:'Quick guilt-free breaks' },
    { id:'lifestyle', label:'🎉 Lifestyle', items: SHOP.lifestyle, desc:'Real-world rewards' },
    { id:'vacation', label:'✈️ Vacation', items: SHOP.vacation, desc:'Big-ticket rewards' }
  ];

  const ownedPerms = new Set(inventory.permanentItems.map(i => i.itemId));
  const consumableCounts = {};
  inventory.consumables.forEach(i => { consumableCounts[i.itemId] = (consumableCounts[i.itemId]||0) + i.quantity; });

  const current = categories.find(c => c.id === cat);
  const items = (current?.items||[]).filter(i => !search || i.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div className="space-y-4 animate-fadeIn">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <h2 className="font-display text-2xl">🏪 The Shop</h2>
        <div className="bg-gradient-to-r from-amber-500/20 to-orange-500/20 border border-amber-500/30 rounded-2xl px-4 py-2 shadow-lg shadow-amber-500/10">
          <span className="text-amber-400 font-display text-xl font-mono">{formatNumber(profile.coins)}</span>
          <span className="text-amber-400 ml-1">🪙</span>
        </div>
      </div>

      <input className="input" placeholder="🔍 Search the shop..." value={search} onChange={e => setSearch(e.target.value)} />

      <div className="flex gap-2 flex-wrap">
        {categories.map(c => (
          <button key={c.id} className={`tab-pill ${cat === c.id ? 'active' : ''}`} onClick={() => setCat(c.id)}>{c.label}</button>
        ))}
      </div>

      {current && <div className="text-sm text-gray-500 -mt-1">{current.desc}</div>}

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3.5">
        {items.map((item, i) => {
          const owned = item.perm && ownedPerms.has(item.id);
          const locked = item.req && !ownedPerms.has(item.req);
          const affordable = profile.coins >= item.cost;
          const count = consumableCounts[item.id] || 0;
          return (
            <div
              key={item.id}
              className={`card card-hover flex flex-col relative overflow-hidden animate-fadeInUp ${
                owned ? 'border-emerald-500/40 bg-emerald-500/5' : locked ? 'opacity-50' : ''
              }`}
              style={{animationDelay: `${i * 0.03}s`}}
            >
              <div className="flex items-start justify-between mb-2">
                <div className="text-4xl">{item.icon}</div>
                {owned && <span className="text-[10px] bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full font-bold">OWNED</span>}
                {!owned && item.consumable && count > 0 && (
                  <span className="text-[10px] bg-cyan-500/20 text-cyan-300 px-2 py-0.5 rounded-full font-bold">×{count}</span>
                )}
                {item.perm && !owned && !locked && <span className="text-[10px] bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full font-bold">PERMANENT</span>}
                {item.reward && <span className="text-[10px] bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded-full font-bold">REWARD</span>}
                {item.consumable && <span className="text-[10px] bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full font-bold">CONSUMABLE</span>}
              </div>
              <h4 className="font-bold mb-1 leading-tight">{item.name}</h4>
              <p className="text-xs text-gray-400 flex-1 mb-3 leading-relaxed">{item.desc}</p>
              {locked && (
                <div className="text-[11px] text-red-400 mb-2 flex items-center gap-1">
                  🔒 Requires: {getShopItem(item.req)?.name}
                </div>
              )}
              <div className="flex items-center justify-between mt-auto pt-2 border-t border-white/5">
                <span className="text-amber-400 font-bold font-mono">{formatNumber(item.cost)} 🪙</span>
                {owned ? (
                  <span className="text-emerald-400 text-xs font-bold">✓ Active</span>
                ) : locked ? (
                  <span className="text-gray-500 text-xs">Locked</span>
                ) : (
                  <button
                    className={`btn ${affordable ? 'btn-primary' : 'btn-secondary'} btn-sm`}
                    onClick={() => affordable && onBuy(item)}
                    disabled={!affordable}
                  >
                    {affordable ? 'Buy' : 'Need 🪙'}
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Story View ────────────────────────────────────────────────────────────────
const StoryView = ({ profile }) => {
  const phases = [
    { id:'startup', minLvl:1, maxLvl:10 },
    { id:'scaleup', minLvl:11, maxLvl:25 },
    { id:'empire', minLvl:26, maxLvl:50 },
    { id:'legend', minLvl:51, maxLvl:75 },
    { id:'titan', minLvl:76, maxLvl:999 }
  ];
  const phaseKeys = phases.map(p => p.id);
  const unlocked = profile.unlockedBeats || [1];

  return (
    <div className="max-w-3xl space-y-4 animate-fadeIn">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h2 className="font-display text-2xl">📖 Your Story</h2>
        <div className="text-sm text-gray-400">Level {profile.level} · <span className={PHASES[profile.phase]?.color}>{PHASES[profile.phase]?.name}</span></div>
      </div>
      {phases.map((phase, pi) => {
        const meta = PHASES[phase.id];
        const isActive = profile.phase === phase.id;
        const isPast = phaseKeys.indexOf(phase.id) < phaseKeys.indexOf(profile.phase);
        const isLocked = !isActive && !isPast;
        const phaseBeats = Object.entries(STORY).filter(([lvl]) => { const n = +lvl; return n >= phase.minLvl && n <= phase.maxLvl; });
        return (
          <div key={phase.id} className={`card relative overflow-hidden ${isActive ? 'border-amber-500/40 shadow-lg shadow-amber-500/5' : ''} ${isLocked ? 'opacity-40' : ''}`}>
            <div className={`absolute -top-20 -right-20 w-40 h-40 rounded-full bg-gradient-to-br ${meta.gradient} opacity-10 blur-3xl pointer-events-none`} />
            <div className="relative flex items-center gap-3 mb-4">
              <span className="text-4xl">{meta.icon}</span>
              <div className="flex-1 min-w-0">
                <h3 className={`font-display text-lg ${isActive ? meta.color : 'text-gray-300'}`}>{meta.name}</h3>
                <span className="text-[11px] text-gray-500">Levels {phase.minLvl}{phase.maxLvl < 999 ? `–${phase.maxLvl}` : '+'}</span>
              </div>
              {isPast && <span className="text-[10px] bg-emerald-500/20 text-emerald-300 px-2 py-1 rounded-md font-bold">✓ DONE</span>}
              {isActive && <span className="text-[10px] bg-amber-500/20 text-amber-300 px-2 py-1 rounded-md font-bold animate-glowPulse">● ACTIVE</span>}
              {isLocked && <span className="text-[10px] bg-gray-500/20 text-gray-400 px-2 py-1 rounded-md font-bold">🔒 LOCKED</span>}
            </div>
            {!isLocked && (
              <div className="space-y-2">
                {phaseBeats.map(([lvl, beat]) => {
                  const isUnlocked = unlocked.includes(+lvl);
                  return (
                    <div key={lvl} className={`p-3 rounded-xl transition-all ${isUnlocked ? 'bg-white/[0.03] border border-white/5' : 'bg-white/[0.01]'}`}>
                      <div className="flex items-center gap-2 mb-1">
                        <span className={isUnlocked ? 'text-amber-400' : 'text-gray-600'}>{isUnlocked ? '✦' : '○'}</span>
                        <span className={`font-semibold text-sm ${isUnlocked ? 'text-white' : 'text-gray-500'}`}>{beat.title}</span>
                        <span className="text-[10px] text-gray-500 ml-auto font-mono">Lv. {lvl}</span>
                      </div>
                      {isUnlocked ? (
                        <p className="text-sm text-gray-400 leading-relaxed ml-5">{beat.text}</p>
                      ) : (
                        <p className="text-xs text-gray-600 ml-5">Reach level {lvl} to unlock</p>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
};

// ── Analytics View ────────────────────────────────────────────────────────────
const AnalyticsView = ({ profile, tasks }) => {
  const completed = tasks.filter(t => ['completed','late'].includes(t.status));
  const failed = tasks.filter(t => t.status === 'failed');
  const byRank = {}; completed.forEach(t => { byRank[t.rank] = (byRank[t.rank]||0) + 1; });
  const successRate = (completed.length + failed.length) === 0 ? 0 : Math.round((completed.length/(completed.length+failed.length))*100);
  const maxByRank = Math.max(...Object.values(byRank), 1);

  // Last 7 days activity
  const last7 = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate() - (6-i)); const ds = d.toDateString();
    const dayDone = tasks.filter(t => ['completed','late'].includes(t.status) && new Date(t.completedAt||t.scheduledStart).toDateString() === ds).length;
    return { date: d, done: dayDone, label: d.toLocaleDateString('en-US',{weekday:'short'}) };
  });
  const max7 = Math.max(...last7.map(d => d.done), 1);

  return (
    <div className="space-y-5 animate-fadeIn">
      <h2 className="font-display text-2xl">📊 Analytics</h2>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        {[
          { label: 'Total XP', value: formatNumber(profile.totalXP), icon: '⭐', gradient: 'from-cyan-500/20 to-blue-500/5', text: 'text-cyan-400' },
          { label: 'Lifetime Coins', value: formatNumber(profile.totalCoinsEarned), icon: '🪙', gradient: 'from-amber-500/20 to-orange-500/5', text: 'text-amber-400' },
          { label: 'Tasks Done', value: profile.totalTasks || 0, icon: '✅', gradient: 'from-emerald-500/20 to-green-500/5', text: 'text-emerald-400' },
          { label: 'Streak', value: profile.streakDays + 'd', icon: '🔥', gradient: 'from-orange-500/20 to-red-500/5', text: 'text-orange-400' }
        ].map((s, i) => (
          <div key={s.label} className={`card bg-gradient-to-br ${s.gradient} animate-fadeInUp`} style={{animationDelay: `${i*0.05}s`}}>
            <div className="text-2xl mb-1">{s.icon}</div>
            <div className={`font-display text-2xl ${s.text}`}>{s.value}</div>
            <div className="text-[11px] text-gray-400 font-medium">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        {/* Activity chart */}
        <div className="card animate-fadeInUp">
          <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">Last 7 Days</h3>
          <div className="flex items-end gap-2 h-32">
            {last7.map((d,i) => (
              <div key={i} className="flex-1 flex flex-col items-center gap-1 group">
                <div className="text-[10px] text-gray-500 font-mono">{d.done}</div>
                <div className="w-full bg-white/5 rounded-md relative overflow-hidden" style={{height:'80%'}}>
                  <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-amber-500 to-amber-300 rounded-md transition-all duration-700"
                    style={{height: `${(d.done/max7)*100}%`}} />
                </div>
                <div className="text-[10px] text-gray-500 font-semibold">{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Stats */}
        <div className="card animate-fadeInUp stagger-1">
          <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">Character Stats</h3>
          <div className="space-y-3">
            {Object.entries(profile.stats).map(([k,v]) => (
              <div key={k}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="capitalize text-gray-300 font-medium">{k}</span>
                  <span className="font-bold font-mono">{v}</span>
                </div>
                <ProgressBar value={v} max={500} barClass={`${k}-bar`} height={8} />
              </div>
            ))}
          </div>
        </div>

        {/* Tasks by rank */}
        <div className="card animate-fadeInUp stagger-2">
          <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">Tasks by Rank</h3>
          {Object.keys(byRank).length === 0 ? (
            <p className="text-gray-500 text-sm">No completed tasks yet.</p>
          ) : (
            <div className="space-y-2.5">
              {['SSS','SS','S','A','B','C','D','E'].filter(r => byRank[r]).map(r => (
                <div key={r} className="flex items-center gap-3">
                  <RankBadge rank={r} />
                  <div className="flex-1 progress-bar" style={{height:8}}>
                    <div className={`progress-fill rank-${r}`} style={{ width:`${(byRank[r]/maxByRank)*100}%` }} />
                  </div>
                  <span className="text-sm font-bold w-8 text-right font-mono">{byRank[r]}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Success rate */}
        <div className="card animate-fadeInUp stagger-3">
          <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">Success Rate</h3>
          {(completed.length + failed.length) === 0 ? (
            <p className="text-gray-500 text-sm">No task history yet.</p>
          ) : (
            <>
              <div className="text-center mb-4">
                <div className="relative inline-block">
                  <svg width="120" height="120" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="10" />
                    <circle cx="60" cy="60" r="50" fill="none" stroke="url(#g1)" strokeWidth="10"
                      strokeDasharray={`${(successRate/100) * 314} 314`} strokeLinecap="round" transform="rotate(-90 60 60)" />
                    <defs><linearGradient id="g1"><stop offset="0%" stopColor="#10b981"/><stop offset="100%" stopColor="#34d399"/></linearGradient></defs>
                  </svg>
                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <div className="font-display text-3xl text-emerald-400">{successRate}%</div>
                    <div className="text-[10px] text-gray-500 uppercase tracking-wider">Success</div>
                  </div>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3 text-center">
                <div className="bg-emerald-500/10 rounded-xl p-3 border border-emerald-500/20">
                  <div className="font-display text-xl text-emerald-400">{completed.length}</div>
                  <div className="text-[11px] text-gray-400">Completed</div>
                </div>
                <div className="bg-red-500/10 rounded-xl p-3 border border-red-500/20">
                  <div className="font-display text-xl text-red-400">{failed.length}</div>
                  <div className="text-[11px] text-gray-400">Failed</div>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* Achievements */}
      <div className="card animate-fadeInUp stagger-4">
        <h3 className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-4">🏆 Achievements ({(profile.achievements||[]).length}/{ACHIEVEMENTS.length})</h3>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5">
          {ACHIEVEMENTS.map(ach => {
            const earned = profile.achievements?.includes(ach.id);
            return (
              <div key={ach.id} className={`p-3 rounded-xl text-center transition-all ${earned ? 'bg-gradient-to-br from-amber-500/15 to-orange-500/5 border border-amber-500/30' : 'bg-white/[0.02] border border-white/5'}`}>
                <div className={`text-3xl mb-1 ${earned ? '' : 'opacity-30 grayscale'}`}>{ach.icon}</div>
                <div className={`text-xs font-bold mb-0.5 ${earned ? 'text-amber-400' : 'text-gray-500'}`}>{ach.name}</div>
                <div className="text-[10px] text-gray-500 leading-tight">{ach.desc}</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

            <div className="card border border-purple-500/30 bg-purple-500/5 mb-5 text-left">
              <div className="text-[10px] text-purple-300 uppercase tracking-widest mb-2 font-bold">📖 New Chapter</div>
              <div className="font-bold text-amber-400 mb-2">{beat.title}</div>
              <p className="text-sm text-gray-300 leading-relaxed">{beat.text}</p>
            </div>
          )}
          <div className="card mb-5 bg-emerald-500/5 border border-emerald-500/20">
            <div className="text-[10px] text-emerald-300 uppercase tracking-widest mb-2 font-bold">Stats Boosted</div>
            <div className="grid grid-cols-2 gap-2 text-sm text-emerald-400 font-bold">
              <div>🎯 +{levels*5} Focus</div>
              <div>💪 +{levels*5} Discipline</div>
              <div>📈 +{levels*5} Consistency</div>
              <div>⚡ +{levels*5} Momentum</div>
            </div>
          </div>
          <button className="btn btn-primary btn-lg w-full" onClick={onClose}>Continue Building 🏗️</button>
        </div>
      </div>
    </div>
  );
};

        {!isFailure && (

            <div className="grid grid-cols-2 gap-3 text-center">

                <div className="font-display text-3xl text-cyan-400 font-mono">+{rewards.xp}</div>

                <div className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Coins 🪙</div>

    success: 'from-emerald-500/90 to-emerald-600/90 border-emerald-400/30',

  };

    <div className={`toast-item flex items-center gap-3 px-4 py-3 rounded-2xl shadow-xl text-white font-semibold text-sm border backdrop-blur-xl bg-gradient-to-r ${colors[type] || colors.success}`}>
      <span className="text-lg">{icon}</span>
      <span>{message}</span>

};

// ── Achievement Toast ─────────────────────────────────────────────────────────
const AchievementToast = ({ ach, onClose }) => (

      <div className="text-4xl">{ach.icon}</div>

        {ach.reward && (
          <div className="text-amber-400 text-xs font-bold">
